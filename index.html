<html lang="en">
<head>

      box-shadow: var(--shadow);

    .subtitle { font-size: 0.95rem; }

    input[type="range"] { width: 100%; accent-color: var(--mauve); }
    textarea {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--rose); border-radius: 9px;
      font-size: 0.95rem; color: var(--text);
      background: var(--peach); outline: none;
      font-family: inherit; resize: vertical; min-height: 90px;
      transition: border-color 0.2s, box-shadow 0.2s;

      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s, background 0.15s;

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-row .btn { flex: 1; }

    .option-btn {
      display: block; width: 100%; padding: 13px 18px;
      background: var(--peach); border: 1.5px solid transparent;
      border-radius: 10px; font-size: 0.95rem; text-align: left;
      color: var(--text); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .option-btn:hover:not(:disabled) { background: var(--pink); border-color: var(--rose); }
    .option-btn:active:not(:disabled) { transform: scale(0.98); }
    .option-btn.correct  { background: #d4edda; border-color: var(--correct); color: #1d5931; }
    .option-btn.wrong    { background: #f8d7da; border-color: var(--wrong);   color: #7b2020; }
    .option-btn:disabled { cursor: default; }
    .options-list { display: flex; flex-direction: column; gap: 10px; }

    .progress-label { font-size: 0.8rem; color: var(--text-2); text-align: right; }

    .badge {

// questions.csv columns: cat,type,question,options,answer,keywords,explanation
// options and keywords use | as a separator within the field
// ══════════════════════════════════════════════════════════════════════════

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const q = {};
    headers.forEach((h, i) => q[h.trim()] = (vals[i] || '').trim());
    q.options  = q.options  ? q.options.split('|').filter(Boolean)  : [];
    q.keywords = q.keywords ? q.keywords.split('|').filter(Boolean) : [];
    return q;
  }).filter(q => q.type && q.question);
}

async function loadQuestions() {
  try {
    const r = await fetch('questions.csv');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return parseCSV(await r.text());
  } catch (e) {
    throw new Error(
      'Could not load questions.csv. ' +
      'Open this folder with a local server (e.g. run: npx serve .) rather than opening index.html directly as a file.'
    );
  }
}

function playCorrect() {
  try {
    const ctx = new AudioContext();
    [[523.25, 0], [659.25, 0.1], [783.99, 0.2]].forEach(([freq, t]) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, ctx.currentTime + t);
      g.gain.linearRampToValueAtTime(0.22, ctx.currentTime + t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.35);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.35);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.28);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.28);
  } catch(e) {}
}

function showScreen(id) {

  window.scrollTo({ top: 0, behavior: 'smooth' });

// QUIZ LOGIC
// ══════════════════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Category filter ────────────────────────────────────────────────────────
let selectedCats = new Set(); // empty = all

function getFilteredQuestions() {
  if (selectedCats.size === 0) return ALL_QUESTIONS;
  return ALL_QUESTIONS.filter(q => selectedCats.has(q.cat));
}

function updateCatCount() {
  const pool = getFilteredQuestions();
  const total = ALL_QUESTIONS.length;
  const el = document.getElementById('cat-count');
  if (selectedCats.size === 0) {
    el.textContent = `(${total} questions)`;
  } else {
    el.textContent = `(${pool.length} of ${total} questions)`;
  }
  // update slider max
  const slider = document.getElementById('num-questions');
  slider.max = pool.length;
  if (parseInt(slider.value) > pool.length) {
    slider.value = pool.length;
    document.getElementById('q-count-display').textContent = pool.length;
  }
}

function buildCatPills(categories) {
  const grid = document.getElementById('cat-pills-grid');
  grid.innerHTML = '';
  categories.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.textContent = cat;
    pill.dataset.cat = cat;
    pill.addEventListener('click', () => {
      if (selectedCats.has(cat)) {
        selectedCats.delete(cat);
        pill.classList.remove('selected');
      } else {
        selectedCats.add(cat);
        pill.classList.add('selected');
      }
      updateCatCount();
    });
    grid.appendChild(pill);
  });
  updateCatCount();
}

function startQuiz() {
  const pool = getFilteredQuestions();
  if (pool.length === 0) {
    alert('No questions match the selected categories. Please select at least one.');
    return;
  }
  const n = parseInt(document.getElementById('num-questions').value) || 20;
  state.numQuestions = Math.min(n, pool.length);
  state.questions    = shuffle(pool).slice(0, state.numQuestions);
  state.currentIndex = 0;
  state.score        = 0;
  state.wrongAnswers = [];
  displayQuestion(0);
  showScreen('quiz');
}

function normalize(s) {
  return s.toLowerCase()
    .replace(/['']/g, "'")
    .replace(/[^a-z0-9\s']/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function tokenize(s) {
  return normalize(s).split(' ').filter(Boolean);
}

// Returns true if any meaningful token from needle appears in haystack tokens
function tokenOverlap(needleStr, haystackStr) {
  const STOP = new Set(['the','a','an','of','in','is','are','was','were','and','or','to','it','its']);
  const needleToks = tokenize(needleStr).filter(t => t.length > 2 && !STOP.has(t));
  const haystackToks = new Set(tokenize(haystackStr));
  if (!needleToks.length) return normalize(haystackStr).includes(normalize(needleStr));
  return needleToks.some(t => haystackToks.has(t));
}

// Simple edit-distance ratio for short strings (< 20 chars each)
function fuzzyMatch(a, b) {
  a = normalize(a); b = normalize(b);
  if (a === b) return true;
  if (a.includes(b) || b.includes(a)) return true;
  // Allow up to 2 edits on short answers
  if (a.length <= 15 && b.length <= 15) {
    let changes = 0, i = 0, j = 0;
    while (i < a.length || j < b.length) {
      if (a[i] === b[j]) { i++; j++; }
      else {
        changes++;
        if (changes > 2) return false;
        if (a.length > b.length) i++;
        else if (b.length > a.length) j++;
        else { i++; j++; }
      }
    }
    return true;
  }
  return false;
}

function checkAnswer(question, userAnswer) {
  const ua = userAnswer.trim().toLowerCase();
  const ca = String(question.answer).trim().toLowerCase();
  if (question.type === 'multiple_choice') return ua === ca;
  if (question.type === 'true_false') {
    const uaBool = ['true','t','yes','correct'].includes(ua);
    return uaBool === (ca === 'true');
  }
  if (question.type === 'free_response') {
    // 1. Direct / fuzzy match against the canonical answer
    if (fuzzyMatch(ua, ca)) return true;
    // 2. The user's answer contains the answer as a substring (handles "it's 43" → answer "43")
    if (normalize(ua).includes(normalize(ca))) return true;
    // 3. Token overlap: any key token from the answer appears in the user's input
    if (tokenOverlap(ca, ua)) return true;
    // 4. Keyword list: if any single keyword matches, accept it (be generous)
    const kws = (question.keywords || '').toString().split('|').map(k => k.trim().toLowerCase()).filter(Boolean);
    if (kws.length && kws.some(k => fuzzyMatch(ua, k) || normalize(ua).includes(normalize(k)) || tokenOverlap(k, ua))) return true;
    return false;
  }
  return false;
}

function displayQuestion(index) {
  const q = state.questions[index];
  state.answered = false;

  const pct = Math.round((index / state.questions.length) * 100);
  document.getElementById('quiz-bar').style.width = pct + '%';
  document.getElementById('quiz-counter').textContent =
    `Question ${index + 1} of ${state.questions.length}`;

  const badgeMap = { multiple_choice:'Multiple Choice', true_false:'True or False', free_response:'Free Response' };
  document.getElementById('q-type-badge').textContent = badgeMap[q.type] || q.type;
  document.getElementById('q-cat-badge').textContent  = q.cat || '';

  document.getElementById('question-text').textContent = q.question;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.innerHTML = '';
  document.getElementById('btn-next').style.display = 'none';

  const area = document.getElementById('answer-area');
  area.innerHTML = '';

  if (q.type === 'multiple_choice') {
    const list = document.createElement('div');
    list.className = 'options-list';
    shuffle(q.options).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => submitAnswer(opt, btn, list));
      list.appendChild(btn);
    });
    area.appendChild(list);
  } else if (q.type === 'true_false') {
    const list = document.createElement('div');
    list.className = 'options-list';
    ['True', 'False'].forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = val;
      btn.addEventListener('click', () => submitAnswer(val.toLowerCase(), btn, list));
      list.appendChild(btn);
    });
    area.appendChild(list);
  } else {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
    const ta = document.createElement('textarea');
    ta.placeholder = 'Type your answer here…';
    const sbtn = document.createElement('button');
    sbtn.className = 'btn btn-primary';
    sbtn.textContent = 'Submit Answer';
    sbtn.addEventListener('click', () => {
      const val = ta.value.trim(); if (!val) return;
      sbtn.disabled = true; ta.disabled = true;
      submitAnswer(val, null, null);
    });
    wrap.appendChild(ta); wrap.appendChild(sbtn);
    area.appendChild(wrap);
  }
}

function submitAnswer(userAnswer, clickedBtn, list) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.currentIndex];
  const correct = checkAnswer(q, userAnswer);

  if (list) {
    list.querySelectorAll('.option-btn').forEach(b => {
      b.disabled = true;
      const txt = b.textContent.toLowerCase();
      const ans = q.answer.toLowerCase();
      if (txt === ans || (q.type === 'true_false' && txt === ans)) b.classList.add('correct');
    });
    if (clickedBtn && !correct) clickedBtn.classList.add('wrong');
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');

  if (q.type === 'free_response') {
    const kwLine = (q.keywords||[]).length
      ? `<p style="margin-top:6px;font-size:0.82rem;opacity:0.85;">Key terms: <em>${q.keywords.join(', ')}</em></p>` : '';
    fb.innerHTML = `
      <div class="feedback-label">${correct ? '✓ Correct!' : '✗ Needs work'}</div>
      <p><strong>Model answer:</strong> ${esc(q.answer)}</p>
      ${kwLine}
      <p style="margin-top:6px;">${esc(q.explanation||'')}</p>`;
  } else {
    fb.innerHTML = `
      <div class="feedback-label">${correct ? '✓ Correct!' : '✗ Incorrect'}</div>
      ${!correct ? `<p><strong>Correct answer:</strong> ${esc(q.answer)}</p>` : ''}
      <p style="margin-top:4px;">${esc(q.explanation||'')}</p>`;
  }

  if (correct) { state.score++; playCorrect(); }
  else {
    playWrong();
    state.wrongAnswers.push({ q, userAnswer, correctAnswer: q.answer });
  }

  const nextBtn = document.getElementById('btn-next');
  const isLast  = state.currentIndex === state.questions.length - 1;
  nextBtn.textContent = isLast ? 'See Results →' : 'Next Question →';
  nextBtn.style.display = 'block';
}

// ══════════════════════════════════════════════════════════════════════════
// RESULTS
// ══════════════════════════════════════════════════════════════════════════
function showResults() {
  const total = state.questions.length, score = state.score;
  const pct   = Math.round((score / total) * 100);
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  const emoji = pct===100?'🌟':pct>=80?'✨':pct>=60?'📖':'💪';
  document.getElementById('score-sub').textContent = `${emoji} ${pct}% — ${scoreMsg(pct)}`;

  const section = document.getElementById('study-guide-section');
  const list    = document.getElementById('study-list');
  list.innerHTML = '';

  if (state.wrongAnswers.length > 0) {
    section.style.display = 'flex';
    state.wrongAnswers.forEach(({ q, userAnswer, correctAnswer }) => {
      const item = document.createElement('div');
      item.className = 'study-item';
      item.innerHTML = `
        <p class="study-q">${esc(q.question)}</p>
        <div class="study-row">
          <span class="study-label">Your answer:</span>
          <span class="study-val user-wrong">${esc(userAnswer||'(no answer)')}</span>
        </div>
        <div class="study-row">
          <span class="study-label">Correct:</span>
          <span class="study-val correct-ans">${esc(correctAnswer)}</span>
        </div>
        ${q.explanation?`<div class="study-row"><span class="study-label">Why:</span><span class="study-val">${esc(q.explanation)}</span></div>`:''}
      `;
      list.appendChild(item);
    });
  } else {
    section.style.display = 'none';
  }
  showScreen('results');
}

function scoreMsg(p) {
  if (p===100) return 'Perfect score! You\'re practically an OSRS wiki.';
  if (p>=90)  return 'Outstanding! Near flawless.';
  if (p>=80)  return 'Great work! High level stuff.';
  if (p>=70)  return 'Solid! A few more runs and you\'ll max.';
  if (p>=60)  return 'Getting there — review that study guide.';
  if (p>=40)  return 'Keep grinding. Check the wiki.';
  return 'Time to hit the books. Or the wiki. Mostly the wiki.';
}

// ══════════════════════════════════════════════════════════════════════════
// UTIL
// ══════════════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════════
// INIT — load CSV then enable the start button
// ══════════════════════════════════════════════════════════════════════════
const btnStart = document.getElementById('btn-start');
btnStart.disabled = true;
btnStart.textContent = 'Loading questions…';

loadQuestions().then(qs => {
  ALL_QUESTIONS = qs;
  // Build sorted unique category list
  const cats = [...new Set(qs.map(q => q.cat))].sort();
  buildCatPills(cats);
  document.getElementById('num-questions').max = qs.length;
  btnStart.disabled = false;
  btnStart.textContent = `Start Quiz →`;

  // Select all / Clear buttons
  document.getElementById('btn-all-cats').addEventListener('click', () => {
    cats.forEach(c => selectedCats.add(c));
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.add('selected'));
    updateCatCount();
  });
  document.getElementById('btn-none-cats').addEventListener('click', () => {
    selectedCats.clear();
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('selected'));
    updateCatCount();
  });
}).catch(err => {
  btnStart.textContent = '⚠ Failed to load questions.csv';
  btnStart.disabled = true;
  // Show error below the button
  const note = document.createElement('p');
  note.style.cssText = 'color:var(--wrong);font-size:0.82rem;margin-top:8px;line-height:1.5;';
  note.textContent = err.message;
  btnStart.parentNode.appendChild(note);
});

// ══════════════════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════════════════
btnStart.addEventListener('click', startQuiz);

document.getElementById('btn-next').addEventListener('click', () => {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) showResults();
  else displayQuestion(state.currentIndex);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  state.currentIndex = 0; state.score = 0; state.wrongAnswers = [];
  state.questions = shuffle(state.questions);
  displayQuestion(0);
  showScreen('quiz');
});

document.getElementById('btn-new').addEventListener('click', () => showScreen('setup'));
</script>
</body>
